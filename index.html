<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ДЕСНА: Рибалка</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: #000;
            color: #fff;
            overflow: hidden;
        }

        /* --- Фонове відео --- */
        .intro {
            position: relative;
            width: 100%;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #000;
        }

        .video_media {
            position: absolute;
            top: 50%;
            left: 50%;
            width: auto;
            height: 100%;
            min-width: 100%;
            min-height: 100%;
            transform: translate(-50%, -50%);
            object-fit: cover;
            opacity: 0.75; /* трохи світліше */
            z-index: 1;
        }

        /* --- Контент поверх відео --- */
        .intro_content {
            position: relative;
            z-index: 2;
            text-align: center;
            max-width: 600px;
            padding: 40px 30px;
            background: rgba(0,0,0,0.35);
            border-radius: 25px;
            backdrop-filter: blur(10px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
        }

        h1 {
            font-size: 2.5rem;
            color: #00c6ff;
            text-shadow: 0 0 10px #00c6ff55;
            margin-bottom: 15px;
        }

        p {
            font-size: 1rem;
            line-height: 1.5;
            margin-bottom: 25px;
            color: #f0f0f0;
        }

        .btn-install {
            display: inline-block;
            padding: 12px 35px; /* менше */
            font-size: 1.2rem;
            font-weight: bold;
            color: white;
            background: linear-gradient(135deg, #00c6ff 0%, #0072ff 100%);
            border-radius: 30px;
            text-decoration: none;
            transition: 0.3s;
            box-shadow: 0 5px 15px rgba(0,114,255,0.4);
        }

        .btn-install:hover {
            transform: scale(1.05);
            box-shadow: 0 8px 25px rgba(0,114,255,0.6);
            filter: brightness(1.2);
        }

        .footer-text {
            margin-top: 20px;
            font-size: 0.75rem;
            color: rgba(255,255,255,0.4);
        }

        @media (max-width: 768px) {
            h1 { font-size: 2rem; }
            p { font-size: 0.95rem; }
            .btn-install { padding: 10px 25px; font-size: 1rem; }
        }
    </style>
</head>
<body>

    <div class="intro">
        <video class="video_media" autoplay muted loop playsinline>
            <source src="background.mp4" type="video/mp4">
        </video>

        <div class="intro_content">
            <h1>ДЕСНА</h1>
            <p>Відчуй атмосферу річки, тишу та азарт риболовлі. Твій берег завжди поруч.</p>
            <a href="https://drive.google.com/file/d/1p-Ot1pk1etyOBXxdjOkNT2lRyHeqgeC2/view?usp=drive_link" class="btn-install">Встановити гру 📥</a>
            <div class="footer-text">DESNA 2026</div>
        </div>
    </div>

</body>
</html>
