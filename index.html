<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ДЕСНА: ТИХЕ ПОЛЮВАННЯ 2026</title>
    <style type="text/css">
        /* Основні налаштування */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background-color: black;
            font-family: 'Segoe UI', Arial, sans-serif;
            overflow: hidden; /* Щоб не було прокрутки */
        }

        /* --- Блок відео (за твоїм прикладом) --- */
        .intro {
            height: 100vh;
            position: relative;
            overflow: hidden;
        }

        .video_media {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
            object-fit: cover; /* Відео розтягується на весь екран без деформації */
            opacity: 0.6; /* Напівпрозорість відео для крутого вигляду */
        }

        /* --- Контент поверх відео --- */
        .intro_content {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            z-index: 3;
            display: flex;
            align-items: center;
            justify-content: center;
            background: radial-gradient(circle, rgba(0,0,0,0.2) 0%, rgba(0,0,0,0.7) 100%);
        }

        /* Скляна панель 2026 */
        .glass-card {
            background: rgba(255, 255, 255, 0.07);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 50px;
            border-radius: 40px;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            max-width: 90%;
            width: 700px;
        }

        h1 {
            color: #fff;
            font-size: 3.5rem;
            text-transform: uppercase;
            letter-spacing: 5px;
            margin-bottom: 20px;
            text-shadow: 0 0 20px rgba(0, 191, 255, 0.6);
        }

        p {
            color: rgba(255,255,255,0.8);
            font-size: 1.2rem;
            margin-bottom: 40px;
            line-height: 1.6;
        }

        /* Футуристична кнопка */
        .btn-install {
            display: inline-block;
            padding: 20px 50px;
            background: linear-gradient(135deg, #00c6ff 0%, #0072ff 100%);
            color: white;
            text-decoration: none;
            font-size: 1.5rem;
            font-weight: bold;
            border-radius: 50px;
            transition: 0.3s;
            box-shadow: 0 10px 25px rgba(0, 114, 255, 0.4);
            border: none;
        }

        .btn-install:hover {
            transform: scale(1.05);
            box-shadow: 0 15px 35px rgba(0, 114, 255, 0.6);
            filter: brightness(1.2);
        }

        .footer-text {
            margin-top: 30px;
            font-size: 0.8rem;
            color: rgba(255,255,255,0.3);
            letter-spacing: 2px;
        }
    </style>
</head>
<body>

    <div class="intro">
        <video class="video_media" autoplay muted loop playsinline>
            <source src="background.mp4" type="video/mp4">
        </video>

        <div class="intro_content">
            <div class="glass-card">
                <h1>ДЕСНА: ТИХЕ ПОЛЮВАННЯ</h1>
                <p>Відчуй подих річки та азарт справжнього улову. Твій улюблений берег тепер завжди під рукою у 2026 році.</p>
                
                <a href="https://drive.google.com/file/d/1p-Ot1pk1etyOBXxdjOkNT2lRyHeqgeC2/view?usp=drive_link" class="btn-install">ВСТАНОВИТИ ГРУ 📥</a>

                <div class="footer-text">DESNA </div>
            </div>
        </div>
    </div>

</body>
</html>
