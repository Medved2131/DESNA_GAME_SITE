<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ДЕСНА</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Segoe UI,Arial;
}

body{
height:100vh;
overflow:hidden;
background:black;
color:white;
}

/* СЦЕНА */
.intro{
position:relative;
height:100vh;
display:flex;
justify-content:center;
align-items:flex-start;
}

/* ВІДЕО */
.video_media{

position:absolute;

top:50%;
left:55%;

transform:translate(-50%,-50%);

height:100%;
min-width:100%;

object-fit:cover;

opacity:0.95;

filter:
brightness(1.5)
contrast(1.4)
saturate(1.3);

z-index:1;
}

/* затемнення щоб текст читався */
.intro::after{

content:"";

position:absolute;

width:100%;
height:100%;

background:linear-gradient(
to bottom,
rgba(0,0,0,0.4),
rgba(0,0,0,0.7)
);

z-index:2;
}

/* ПАНЕЛЬ */
.intro_content{

position:relative;
z-index:3;

margin-top:80px;

width:85%;
max-width:350px;

padding:22px;

border-radius:18px;

background:rgba(0,0,0,0.35);

backdrop-filter:blur(10px);

text-align:center;
}

/* ЗАГОЛОВОК */
h1{

font-size:26px;

color:#00e0ff;

margin-bottom:10px;

text-shadow:0 0 10px rgba(0,200,255,0.6);
}

/* ТЕКСТ */

p{

font-size:14px;

line-height:1.4;

color:#eeeeee;

margin-bottom:18px;

}

/* КНОПКА */

.btn-install{

display:inline-block;

padding:10px 24px;

border-radius:25px;

background:linear-gradient(135deg,#00c6ff,#0072ff);

font-size:14px;

font-weight:bold;

color:white;

text-decoration:none;

box-shadow:0 4px 12px rgba(0,120,255,0.6);

transition:0.25s;

}

.btn-install:hover{

transform:scale(1.05);

}

/* футер */

.footer-text{

margin-top:10px;

font-size:11px;

opacity:0.6;

}

</style>
</head>

<body>

<div class="intro">

<video class="video_media" autoplay muted loop playsinline>
<source src="background.mp4" type="video/mp4">
</video>

<div class="intro_content">

<h1>ДЕСНА</h1>

<p>
Відчуй атмосферу річки, тишу та азарт риболовлі.
Твій берег завжди поруч.
</p>

<a href="https://drive.google.com/file/d/1p-Ot1pk1etyOBXxdjOkNT2lRyHeqgeC2/view?usp=drive_link" class="btn-install">
Встановити гру 🎣
</a>

<div class="footer-text">
DESNA
</div>

</div>

</div>

</body>
</html>
